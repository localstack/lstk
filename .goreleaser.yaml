version: 2

project_name: lstk

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c "go run . completion bash > completions/lstk.bash"
    - sh -c "go run . completion zsh > completions/lstk.zsh"
    - sh -c "go run . completion fish > completions/lstk.fish"

builds:
  - id: lstk
    main: ./main.go
    binary: lstk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/localstack/lstk/internal/version.version={{ .Version }} -X github.com/localstack/lstk/internal/version.commit={{ .Commit }} -X github.com/localstack/lstk/internal/version.buildDate={{ .Date }}

archives:
  - id: lstk
    ids:
      - lstk
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - completions/*

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

homebrew_casks:
  - name: lstk
    directory: Casks
    repository:
      owner: localstack
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/localstack/lstk
    description: "LocalStack CLI v2 - Start and manage LocalStack emulators"
    license: Apache-2.0
    url:
      verified: github.com/localstack/lstk
    completions:
      bash: completions/lstk.bash
      zsh: completions/lstk.zsh
      fish: completions/lstk.fish
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/lstk"]
          end
