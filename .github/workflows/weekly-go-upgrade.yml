name: Weekly Go Toolchain Upgrade

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade-go:
    name: Upgrade Go Toolchain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Upgrade Go toolchain
        run: |
          go get toolchain@latest
          go mod tidy
          cd test/integration
          go get go@latest
          go mod tidy

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/weekly-go-upgrade
          author: "LocalStack Bot <localstack-bot@users.noreply.github.com>"
          committer: "LocalStack Bot <localstack-bot@users.noreply.github.com>"
          commit-message: "chore(go): weekly Go toolchain upgrade"
          title: "chore(go): weekly Go toolchain upgrade"
          body: |
            Automated weekly Go toolchain upgrade.

            - Updates the `toolchain` directive to the latest released Go version.
            - Runs `go mod tidy` to keep module files consistent.
          labels: dependencies
          token: ${{ secrets.PRO_ACCESS_TOKEN }}
