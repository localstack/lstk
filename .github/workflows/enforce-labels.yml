name: Enforce Labels
on:
  pull_request_target:
    types: [labeled, unlabeled, opened, synchronize]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: mheap/github-action-required-labels@0ac283b4e65c1fb28ce6079dea5546ceca98ccbe # v5
        with:
          mode: exactly
          count: 1
          labels: "docs: needed, docs: skip"