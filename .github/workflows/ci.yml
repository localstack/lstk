name: LSTK CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version-file: .tool-versions

  goreleaser-check:
    name: GoReleaser Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run GoReleaser check
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: make test
        env:
          CREATE_JUNIT_REPORT: "true"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: test-results.xml

      - name: Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Test Results
          path: test-results.xml
          reporter: java-junit

  test-integration:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            test/integration/go.sum

      - name: Run integration tests
        run: make test-integration
        env:
          CREATE_JUNIT_REPORT: "true"
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results-${{ matrix.os }}
          path: test-integration-results.xml

      - name: Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Integration Test Results (${{ matrix.os }})
          path: test-integration-results.xml
          reporter: java-junit

  release:
    name: Build and Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - lint
      - goreleaser-check
      - test-unit
      - test-integration
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Validate version tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v0\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match version format v0.minor.patch"
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.PRO_ACCESS_TOKEN }}

      - name: Upload GoReleaser artifacts
        uses: actions/upload-artifact@v7
        with:
          name: goreleaser-dist
          path: dist/
          retention-days: 3

  publish-npm:
    name: Publish to NPM
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download GoReleaser artifacts
        uses: actions/download-artifact@v7
        with:
          name: goreleaser-dist
          path: dist/

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to NPM
        uses: evg4b/goreleaser-npm-publisher-action@v1
        with:
          token: ${{ secrets.NPM_AUTH_TOKEN }}
          prefix: "@localstack"
          license: Apache-2.0
          description: "LocalStack CLI v2 - Start and manage LocalStack emulators"
          keywords: localstack, cli, aws, emulator, docker

  publish-winget:
    name: Publish to Windows Package Manager
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: windows-latest
    steps:
      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile wingetcreate.exe

      - name: Update and submit winget manifest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $baseUrl = "https://github.com/localstack/lstk/releases/download/v${version}"
          ./wingetcreate.exe update LocalStack.lstk `
            --urls "$baseUrl/lstk_${version}_windows_amd64.zip" "$baseUrl/lstk_${version}_windows_arm64.zip" `
            --version $version `
            --token "${{ secrets.PRO_ACCESS_TOKEN }}" `
            --submit
