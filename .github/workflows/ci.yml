name: LSTK CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version-file: .tool-versions

  goreleaser-check:
    name: GoReleaser Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run GoReleaser check
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: make test
        env:
          CREATE_JUNIT_REPORT: "true"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: test-results.xml

      - name: Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Test Results
          path: test-results.xml
          reporter: java-junit

  test-integration:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            test/integration/go.sum

      # Install lstk via Homebrew so the Homebrew update integration test
      # (TestUpdateHomebrew) can locate a real Caskroom binary path.
      - name: Install lstk via Homebrew
        if: matrix.os == 'macos-latest'
        run: brew install localstack/tap/lstk

      - name: Run integration tests
        run: make test-integration
        env:
          CREATE_JUNIT_REPORT: "true"
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
          LSTK_TEST_HOMEBREW: ${{ matrix.os == 'macos-latest' && '1' || '0' }}
          LSTK_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results-${{ matrix.os }}
          path: test-integration-results.xml

      - name: Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Integration Test Results (${{ matrix.os }})
          path: test-integration-results.xml
          reporter: java-junit

  release:
    name: Build and Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - lint
      - goreleaser-check
      - test-unit
      - test-integration
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Validate version tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v0\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match version format v0.minor.patch"
            exit 1
          fi

      - name: Install rcodesign
        run: |
          curl -fsSL -o rcodesign.tar.gz \
            "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.29.0/apple-codesign-0.29.0-x86_64-unknown-linux-musl.tar.gz"
          tar xzf rcodesign.tar.gz
          sudo mv apple-codesign-*/rcodesign /usr/local/bin/
          rcodesign --version

      - name: Write Apple signing certificate
        run: echo "${{ secrets.APPLE_CERTS_BASE64 }}" | base64 -d > /tmp/apple-cert.p12

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.PRO_ACCESS_TOKEN }}
          APPLE_CERT_PATH: /tmp/apple-cert.p12
          APPLE_SIGN_CERTS_PW: ${{ secrets.APPLE_SIGN_CERTS_PW }}

      - name: Write App Store Connect API key
        run: echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 -d > /tmp/apple-api-key.p8

      - name: Notarize macOS archives
        run: |
          for f in dist/*darwin*.tar.gz; do
            echo "Notarizing ${f}..."
            rcodesign notary-submit "$f" \
              --api-key-path /tmp/apple-api-key.p8 \
              --api-key-id "${{ secrets.APPLE_API_KEY_ID }}" \
              --api-issuer "${{ secrets.APPLE_API_ISSUER }}" \
              --wait
          done

      - name: Clean up signing credentials
        if: always()
        run: rm -f /tmp/apple-cert.p12 /tmp/apple-api-key.p8

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to NPM
        uses: evg4b/goreleaser-npm-publisher-action@v1
        with:
          token: ${{ secrets.NPM_AUTH_TOKEN }}
          prefix: "@localstack"
          license: Apache-2.0
          description: "LocalStack CLI v2 - Start and manage LocalStack emulators"
          keywords: |
            localstack
            cli
            aws
            emulator
            docker
